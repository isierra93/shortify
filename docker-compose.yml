version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db-shortify
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "db-shortify"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videoflow-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/videos:/app/videos
      - ./backend/videos_procesados:/app/videos_procesados
      # Volumen compartido con ai-service para intercambiar archivos sin HTTP
      - shared_videos:/app/videos_subidos
    depends_on:
      - mysql-db
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db-shortify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # URL del microservicio IA (usada por VideoAnalysisService en Java)
      - AI_SERVICE_URL=http://ai-service:8000

  frontend:
    build:
      context: ./frontend/videoflow
      dockerfile: Dockerfile
    container_name: videoflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # TODO: Descomentar y ajustar cuando el frontend necesite conectarse al backend
      # - VITE_API_URL=http://localhost:8080
      - NODE_ENV=development

  # -----------------------------------------------------------------------
  # AI Service (Python + FastAPI + OpenCV)
  # -----------------------------------------------------------------------
  # Este servicio es OPCIONAL. Para levantarlo junto con el resto:
  #   docker compose --profile ai up
  #
  # Para levantarlo de forma independiente:
  #   docker compose up ai-service
  #
  # Para levantar todo SIN este servicio (comportamiento por defecto):
  #   docker compose up
  # -----------------------------------------------------------------------
  ai-service:
    profiles:
      - ai
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: videoflow-ai-service
    ports:
      - "8000:8000"
    volumes:
      # Mismo volumen compartido que el backend → lee los videos sin copiarlos
      - shared_videos:/app/videos_subidos
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  mysql_data:
  # Volumen compartido entre backend y ai-service
  shared_videos: