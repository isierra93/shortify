spring.application.name=Video Converter API

#Configuracion de DB MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db-shortify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Mantiene las tablas actualizadas automaticamente
spring.jpa.hibernate.ddl-auto=update

#Borra y crea las tablas al iniciar la App
#spring.jpa.hibernate.ddl-auto=create

#Espacio maximo disponible de video (Por ahora)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# -----------------------------------------------------------------------
# AI Service (microservicio Python + FastAPI + OpenCV)
# -----------------------------------------------------------------------
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.enabled=${AI_SERVICE_ENABLED:false}
ai.service.connect-timeout=5000
ai.service.read-timeout=30000

# -----------------------------------------------------------------------
# Swagger / OpenAPI
# -----------------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
